<div id="portfolio"></div>
@if (isVisible) {
<header @flyInRight>
    <span>
        <div></div>
        <h1>Portfolio</h1>
        <div></div>
    </span>
    @if (appComponent.chosenLanguege === 'EN') {
    <p>Feel free to try out some of my projects.</p>
    } @else {
    <p>Probieren Sie gerne einige meiner Projekte aus.</p>}
</header>
}

<section>
    @for (project of projects; track projects; let even = $even; let index = $index;) {
    <app-project [project]="project" [even]="even" [index]="index"></app-project>
    }
</section>
